<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cute Romantic Page - No JS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #ffdbe8 0%, #ffc6da 35%, #ffb6cf 65%, #ffabc9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    .hearts {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      bottom: -40px;
      color: rgba(255,255,255,0.85);
      font-size: clamp(16px, 2vw, 28px);
      animation: floatUp linear infinite;
    }

    .heart:nth-child(1) { left: 5%; animation-duration: 7s; }
    .heart:nth-child(2) { left: 14%; animation-duration: 9s; animation-delay: 1s; }
    .heart:nth-child(3) { left: 22%; animation-duration: 8s; animation-delay: 2s; }
    .heart:nth-child(4) { left: 31%; animation-duration: 10s; animation-delay: 1.5s; }
    .heart:nth-child(5) { left: 40%; animation-duration: 7.5s; animation-delay: 0.8s; }
    .heart:nth-child(6) { left: 52%; animation-duration: 8.5s; animation-delay: 2.2s; }
    .heart:nth-child(7) { left: 63%; animation-duration: 9.5s; animation-delay: 1.1s; }
    .heart:nth-child(8) { left: 74%; animation-duration: 7.8s; animation-delay: 2.4s; }
    .heart:nth-child(9) { left: 85%; animation-duration: 8.8s; animation-delay: 0.5s; }
    .heart:nth-child(10){ left: 93%; animation-duration: 10.2s; animation-delay: 1.8s; }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(.8); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-120vh) scale(1.18) rotate(15deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(92vw, 700px);
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.42);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 32px;
      box-shadow: 0 18px 50px rgba(173, 52, 104, 0.18);
      padding: 28px 18px 30px;
      text-align: center;
    }

    h1 {
      color: #8b2f55;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      margin-bottom: 18px;
      line-height: 1.3;
    }

    .sparkle {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.9;
      animation: blink 1.6s infinite;
    }
    .sparkle.one { top: 18px; left: 16px; }
    .sparkle.two { top: 22px; right: 18px; }
    .sparkle.three { bottom: 18px; left: 16px; }

    @keyframes blink {
      0%,100% { opacity: .35; transform: scale(.92); }
      50% { opacity: 1; transform: scale(1.12); }
    }

    .teddy-wrap {
      display: flex;
      justify-content: center;
      margin: 12px 0 22px;
    }

    .teddy {
      width: min(250px, 64vw);
      height: auto;
      animation: teddyFloat 3.5s ease-in-out infinite;
      filter: drop-shadow(0 10px 18px rgba(139, 47, 85, 0.12));
    }

    @keyframes teddyFloat {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .buttons {
      position: relative;
      min-height: 120px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 6px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 999px;
      padding: 16px 26px;
      min-width: 220px;
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
      text-align: center;
    }

    .btn-yes {
      color: white;
      background: linear-gradient(135deg, #ff6fa9, #ff9cc3);
      box-shadow: 0 12px 24px rgba(255, 111, 169, 0.28);
    }

    .btn-yes:hover, .btn-yes:active {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 16px 28px rgba(255, 111, 169, 0.34);
    }

    .btn-no {
      background: transparent;
      border: 2px solid rgba(139, 47, 85, 0.35);
      color: #8b2f55;
    }

    .btn-no:hover {
      transform: translateX(80px);
    }

    .love-message {
      display: none;
      margin-top: 22px;
      background: rgba(255,255,255,0.68);
      color: #7d2149;
      border-radius: 22px;
      padding: 18px 16px;
      line-height: 1.9;
      font-size: clamp(.98rem, 2.2vw, 1.08rem);
      white-space: pre-line;
      word-break: break-word;
      box-shadow: 0 10px 25px rgba(173,52,104,0.08);
      animation: fadePop .45s ease;
    }

    .love-message:target {
      display: block;
    }

    @keyframes fadePop {
      from { opacity: 0; transform: translateY(10px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .small-note {
      margin-top: 14px;
      color: #9a4d70;
      font-size: 0.9rem;
    }

    @media (max-width: 520px) {
      .card { padding: 22px 14px 26px; border-radius: 26px; }
      .buttons { min-height: 140px; }
      .btn { width: 100%; max-width: 260px; }
      .love-message { font-size: 1rem; }
      .btn-no:hover { transform: none; }
    }
  </style>
</head>
